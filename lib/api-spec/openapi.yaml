          type: integer
        userId:
          type: integer
        courseId:
          type: integer
        enrolledAt:
          type: string
        completedAt:
          type: ["string", "null"]

    # ─── MODULE SCHEMAS ───────────────────────────────────────────────────────

    Module:
      type: object
      required: [id, courseId, title, orderIndex]
      properties:
