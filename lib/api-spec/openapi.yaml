        courseId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        orderIndex:
          type: integer

    ModuleWithLessons:
      type: object
      required: [id, courseId, title, orderIndex, lessons]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        orderIndex:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"

    ModuleInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        orderIndex:
          type: integer

    ModuleUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        orderIndex:
          type: integer

    # ─── LESSON SCHEMAS ───────────────────────────────────────────────────────

    Lesson:
      type: object
