        contentUrl:
          type: ["string", "null"]
        durationSeconds:
          type: integer
        orderIndex:
          type: integer

    LessonInput:
      type: object
      required: [title, type]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [VIDEO, PDF, QUIZ]
        contentUrl:
          type: string
        durationSeconds:
          type: integer
        orderIndex:
          type: integer

